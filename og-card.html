<!DOCTYPE html>

<head>

<title>OG card source — loopzero.org</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px;
    height: 630px;
    background: #f3f0e7;      /* flat cream field — no weather */
    overflow: hidden;
  }
  body { position: relative; font-feature-settings: "liga" 1, "kern" 1, "onum" 1; }

  /* MASTHEAD — mark + wordmark, flush left at x=88, baseline block top y=64 */
  .masthead {
    position: absolute;
    left: 88px;
    top: 64px;
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .mark { width: 72px; height: 72px; display: block; }
  .mark svg { display: block; width: 100%; height: 100%; overflow: visible; }
  .wordmark {
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    font-weight: 500;
    font-size: 33px;
    letter-spacing: 0.34em;
    color: #1a1710;
    line-height: 1;
    margin-right: -0.34em;
  }

  /* HEADLINE — serif, left at x=88 */
  .headline {
    position: absolute;
    left: 88px;
    top: 196px;
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 400;
    font-size: 74px;
    line-height: 1.2;
    letter-spacing: -0.012em;
    color: #1a1710;
    max-width: 1024px;
  }
  .headline .em { font-style: italic; font-weight: 500; color: #1a1710; }

  /* FOOTER — rule + meta row */
  .rule {
    position: absolute;
    left: 88px;
    right: 88px;
    top: 524px;
    height: 1px;
    background: #d8d4c8;
  }
  .foot {
    position: absolute;
    left: 88px;
    right: 88px;
    top: 552px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
  }
  .foot .left {
    font-weight: 400;
    font-size: 21px;
    letter-spacing: 0.12em;
    color: #6e6a62;
    text-transform: uppercase;
  }
  .foot .right {
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: #1a1710;
  }
</style>
</head>
<body>
  <div class="masthead">

    </span>

  </div>

  <h1 class="headline">A falsifiable benchmark for<br><span class="em">collapse-warning claims</span> in<br>recursive systems.</h1>

</body>
